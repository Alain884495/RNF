{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{% static 'Authentification/inscriptionOperateur.css' %}"
    />
    <title>Document</title>
  </head>

  <body>
    <div class="container">
      <h2>Inscription Opérateur</h2>
      <form
        method="post"
        action="{% url 'Authentification:inscription_operateur' %}"
        class="login-form"
      >
        {% csrf_token %}
        <div class="form-row">
          <div class="input-group">
            <label for="username">Nom d'utilisateur:</label>
            <input
              type="text"
              id="username"
              name="username"
              value="{{ request.POST.username|default:''|escape }}"
            />
          </div>

          <div class="input-group">
            <label for="password">Mot de passe:</label>
            <input type="password" id="password" name="password" />
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="first_name">Nom:</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              value="{{ request.POST.first_name|default:''|escape }}"
            />
          </div>

          <div class="input-group">
            <label for="last_name">Prénom:</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              value="{{ request.POST.last_name|default:''|escape }}"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="email">Email:</label>
            <input
              type="email"
              id="email"
              name="email"
              value="{{ request.POST.email|default:''|escape }}"
            />
          </div>

          <div class="input-group">
            <label for="phone">Numéro de téléphone:</label>
            <input
              type="text"
              id="phone"
              name="phone"
              value="{{ request.POST.phone|default:''|escape }}"
            />
          </div>
        </div>

        <div class="input-group">
          <label for="raisonSociale">Raison sociale:</label>
          <input
            type="text"
            id="raisonSociale"
            name="raisonSociale"
            value="{{ request.POST.raisonSociale|default:''|escape }}"
          />
        </div>
        <div class="form-row">
          <div class="input-group">
            <label for="nif">Nif:</label>
            <input
              type="text"
              id="nif"
              name="nif"
              value="{{ request.POST.nif|default:''|escape }}"
            />
          </div>

          <div class="input-group">
            <label for="stat">Stat:</label>
            <input
              type="text"
              id="stat"
              name="stat"
              value="{{ request.POST.stat|default:''|escape }}"
            />
          </div>
        </div>

        <div class="input-group">
          <label for="adresse">Adresse:</label>
          <input
            type="text"
            id="adresse"
            name="adresse"
            value="{{ request.POST.adresse|default:''|escape }}"
          />
        </div>

        <button type="submit">S'inscrire</button>
      </form>
      <div class="signup-links">
        <a href="{% url 'Authentification:index' %}"> Se connecter</a>
      </div>
    </div>

    <div id="customAlert" class="alert-box hidden">
      <span id="customAlertMsg"></span>
      <button id="customAlertClose">&times;</button>
    </div>
  </body>

  <script>
        // Fonction unique à appeler partout
        function customAlert(msg, type = 'info', seconds = 4) {
          const box = document.getElementById('customAlert');
          const msgEl = document.getElementById('customAlertMsg');
          const close = document.getElementById('customAlertClose');

          msgEl.textContent = msg;
          box.classList.remove('hidden', 'error', 'success');
          box.classList.add(type);          // type = 'info' | 'error' | 'success'

          // Fermeture auto après X secondes
          const timer = setTimeout(() => box.classList.add('hidden'), seconds * 1000);

          // Fermeture manuelle
          close.onclick = () => {
            clearTimeout(timer);
            box.classList.add('hidden');
          };
        }
        // Affiche les messages Django si présents
    {% if messages %}
          {% for m in messages %}
            {% if 'success' in m.tags %}
              customAlert('{{ m|escapejs }}', 'success', 5);
            {% else %}
              customAlert('{{ m|escapejs }}', 'error', 3);
            {% endif %}
          {% endfor %}
    {% endif %}
  </script>
</html>
